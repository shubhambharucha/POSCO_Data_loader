<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QAD Data Loader</title>
<link rel="icon" type="image/png" href="public/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:#050e09;
  color:#d4e8d8;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
  cursor:none;
  -webkit-font-smoothing:antialiased;
}
:root{
  --green:#00e676;
  --green-dim:rgba(0,230,118,.08);
  --green-border:rgba(0,230,118,.18);
  --green-glow:rgba(0,230,118,.22);
  --green-bright:rgba(0,230,118,.35);
  --surface:rgba(255,255,255,.03);
  --surface-hover:rgba(255,255,255,.055);
  --border:rgba(255,255,255,.07);
  --border-sel:rgba(0,230,118,.3);
  --text:#d4e8d8;
  --muted:#527060;
  --muted2:#2a3d30;
  --mono:'DM Mono',monospace;
}
#cur{position:fixed;width:8px;height:8px;background:var(--green);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,opacity .2s;}
#cur-ring{position:fixed;width:28px;height:28px;border:1px solid rgba(0,230,118,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s;}
body.cur-hover #cur{width:14px;height:14px;background:#fff}
body.cur-hover #cur-ring{width:46px;height:46px;border-color:rgba(0,230,118,.6)}
#grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
#grid-bg svg{width:100%;height:100%;animation:grid-pulse 5s ease-in-out infinite;}
@keyframes grid-pulse{0%,100%{opacity:.38}50%{opacity:.9}}
#grid-bg::after{content:'';position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);width:900px;height:700px;background:radial-gradient(ellipse at center,rgba(0,180,80,.12) 0%,rgba(0,100,50,.06) 40%,transparent 70%);pointer-events:none;animation:bloom 7s ease-in-out infinite;}
@keyframes bloom{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
#nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 52px;transition:background .4s,border-color .4s;border-bottom:1px solid transparent;}
#nav.scrolled{background:rgba(5,14,9,.9);border-color:var(--border);backdrop-filter:blur(16px);}
.nav-logo{display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500;color:#fff;text-decoration:none;letter-spacing:-.01em;}
.nav-logo img{padding-top:20px;height:100px;object-fit:contain;}
.nav-links{display:flex;gap:36px}
.nav-links a{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;font-family:var(--mono);letter-spacing:.04em;}
.nav-links a:hover{color:var(--green)}
.nav-settings{background:transparent;border:1px solid var(--green-border);color:var(--green);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;transition:all .2s;font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
.nav-settings:hover{border-color:var(--green);color:#fff;background:var(--green-dim);box-shadow:0 0 20px rgba(0,230,118,.3);}
#hero{position:relative;min-height:260px;display:flex;align-items:center;justify-content:center;padding:0 52px;z-index:1;}
.hero-inner{text-align:center;padding-top:60px;}
.hero-h1{font-size:clamp(42px,6vw,68px);font-weight:700;letter-spacing:-.03em;line-height:1.05;color:#fff;}
.divider{border:none;border-top:1px solid var(--border);margin:0;position:relative;z-index:1;}
#app{padding:60px 52px;position:relative;z-index:1;min-height:100vh;}
.app-wrapper{display:grid;grid-template-columns:60% 1fr;gap:28px;align-items:start;}
.e-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.e-card{background:#050e09;padding:28px;display:flex;flex-direction:column;gap:16px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;border:1.5px solid rgba(0,230,118,.12);border-radius:8px;box-shadow:0 0 16px rgba(0,230,118,.06),inset 0 0 16px rgba(0,230,118,.03);}
.e-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--green);transform:scaleY(0);transform-origin:bottom;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.e-card:hover{background:var(--surface);border-color:var(--green-border);box-shadow:0 0 24px rgba(0,230,118,.18),inset 0 0 20px rgba(0,230,118,.06);}
.e-card:hover::before{transform:scaleY(1)}
.e-card.sel{background:var(--surface);border-color:var(--green-border);box-shadow:0 0 28px rgba(0,230,118,.22),inset 0 0 24px rgba(0,230,118,.08);}
.e-card.sel::before{transform:scaleY(1)}
.e-card.success{background:rgba(0,230,118,.03);border-color:rgba(0,230,118,.25);box-shadow:0 0 28px rgba(0,230,118,.18),inset 0 0 24px rgba(0,230,118,.06);}
.e-card.success::before{transform:scaleY(1);background:var(--green)}
.e-card.failed{background:rgba(220,50,50,.03);border-color:rgba(220,50,50,.2);}
.e-card.failed::before{transform:scaleY(1);background:#dc3232}
.e-card.processing{animation:card-proc 2.2s ease-in-out infinite;}
@keyframes card-proc{0%,100%{border-color:rgba(0,230,118,.06)}50%{border-color:rgba(0,230,118,.25)}}
.e-header{display:flex;align-items:start;justify-content:space-between;}
.e-left{display:flex;align-items:center;gap:12px;flex:1;}
.e-icon{width:40px;height:40px;border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--surface);transition:all .2s;flex-shrink:0;}
.e-card:hover .e-icon,.e-card.sel .e-icon{background:var(--green-dim);border-color:var(--green-border);}
.e-card.failed .e-icon{background:rgba(220,50,50,.06);border-color:rgba(220,50,50,.2);}
.e-icon svg{width:18px;height:18px;stroke:#527060;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;}
.e-card:hover .e-icon svg,.e-card.sel .e-icon svg{stroke:var(--green)}
.e-card.failed .e-icon svg{stroke:#dc5050}
.e-info{flex:1;}
.e-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.01em;margin-bottom:2px;}
.e-sub{font-family:var(--mono);font-size:11px;color:var(--muted);}
.e-chk{width:16px;height:16px;border:1.5px solid var(--muted2);border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.e-chk.on{border-color:var(--green);background:rgba(0,230,118,.15);}
.e-chk svg{width:9px;height:7px;stroke:var(--green);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.e-badge-group{display:flex;flex-direction:column;gap:6px;padding:12px;background:rgba(255,255,255,.015);border:1px solid rgba(0,230,118,.1);border-radius:6px;font-family:var(--mono);font-size:11px;}
.e-badge-row{display:flex;align-items:center;justify-content:space-between;}
.e-badge-label{color:var(--muted);}
.e-badge-count{color:var(--green);font-weight:500;}
.e-badge-count.fail{color:#dc5050;}
.e-badge-count.warn{color:#e09020;}
#terminal-panel{position:sticky;top:80px;height:520px;background:#030a05;border:2px solid rgba(0,230,118,.2);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 32px rgba(0,230,118,.16),inset 0 0 24px rgba(0,230,118,.08);}
.term-header{display:flex;align-items:center;gap:6px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);}
.term-dot{width:10px;height:10px;border-radius:50%;}
.term-title{flex:1;text-align:center;font-family:var(--mono);font-size:11px;color:#fff;letter-spacing:.05em;text-transform:uppercase;}
.term-body{flex:1;overflow-y:auto;padding:16px 18px;font-family:var(--mono);font-size:13px;line-height:2;color:#fff;}
.term-body::-webkit-scrollbar{width:6px;}
.term-body::-webkit-scrollbar-track{background:transparent;}
.term-body::-webkit-scrollbar-thumb{background:rgba(0,230,118,.2);border-radius:3px;}
.term-body::-webkit-scrollbar-thumb:hover{background:rgba(0,230,118,.35);}
.term-line{display:flex;align-items:flex-start;gap:8px;margin-bottom:2px;}
.term-sym{flex-shrink:0;font-weight:500;width:20px;text-align:center;color:var(--green);}
.term-sym.process{color:var(--green)}
.term-sym.success{color:var(--green)}
.term-sym.fail{color:#dc5050}
.term-sym.warn{color:#e09020}
.term-text{flex:1;word-break:break-word;color:#fff;}
.term-entity{color:#fff;font-weight:600;margin-top:12px;margin-bottom:6px;padding-top:6px;border-top:1px solid rgba(0,230,118,.1);}
.term-progress{opacity:.7;font-style:italic;}
.act-row{display:flex;align-items:center;gap:20px;padding:24px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-top:20px;margin-bottom:20px;}
.act-line{flex:1;height:1px}
.act-line.l{background:linear-gradient(to right,transparent,rgba(0,230,118,.1))}
.act-line.r{background:linear-gradient(to left,transparent,rgba(0,230,118,.1))}
.act-btns{display:flex;gap:10px}
.a-btn{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:11px 36px;background:transparent;color:var(--green);border:1px solid var(--green-border);cursor:pointer;border-radius:4px;transition:all .2s;display:flex;align-items:center;gap:8px;}
.a-btn:hover:not(:disabled){background:var(--green-dim);box-shadow:0 0 20px var(--green-glow);}
.a-btn:disabled{opacity:.22;cursor:not-allowed;}
.a-btn.burst{animation:btnburst .7s ease-out;}
@keyframes btnburst{0%{box-shadow:none}35%{box-shadow:0 0 40px rgba(0,230,118,.5),0 0 80px rgba(0,230,118,.15)}100%{box-shadow:none}}
.spinner{width:10px;height:10px;border:1.5px solid rgba(0,230,118,.2);border-top-color:var(--green);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.results-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;animation:fadein .35s ease;margin-top:8px;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.results-head{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--border);}
.results-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--green);opacity:.65;}
.results-count{font-family:var(--mono);font-size:10px;color:var(--muted);}
table.rt{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px;}
table.rt th{padding:8px 16px;text-align:left;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);border-bottom:1px solid var(--border);font-weight:400;}
table.rt td{padding:9px 16px;border-bottom:1px solid rgba(255,255,255,.025);color:var(--muted);vertical-align:middle;}
table.rt tr:last-child td{border-bottom:none}
table.rt tr:hover td{background:rgba(255,255,255,.015)}
.td-ent{color:#fff!important;font-weight:500}
.td-ok{color:var(--green)!important;font-weight:500}
.td-fail{color:#dc5050!important;font-weight:500}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.4,0,.2,1);}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.08s}.d2{transition-delay:.16s}.d3{transition-delay:.24s}.d4{transition-delay:.32s}
@media(max-width:1024px){.app-wrapper{grid-template-columns:1fr;}#terminal-panel{position:relative;top:0;}}
@media(max-width:768px){#nav{padding:0 20px}#hero,.act-row,#app{padding-left:20px;padding-right:20px}.e-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<div id="grid-bg">
  <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="none">
    <defs>
      <pattern id="smallgrid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,200,80,0.07)" stroke-width="0.5"/>
      </pattern>
      <pattern id="grid" width="200" height="200" patternUnits="userSpaceOnUse">
        <rect width="200" height="200" fill="url(#smallgrid)"/>
        <path d="M 200 0 L 0 0 0 200" fill="none" stroke="rgba(0,200,80,0.12)" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </svg>
</div>

<nav id="nav">
  <a href="#" class="nav-logo">
    <img src="public/logo.png" alt="Yash Technologies"/>
    <span></span>
  </a>
  <div class="nav-links">
    <a href="#app">App</a>
  </div>
  <button class="nav-settings" onclick="window.location.href='settings.html'" title="Settings"><span>⚙</span> Settings</button>
</nav>

<section id="hero">
  <div class="hero-inner">
    <h1 class="hero-h1">QAD Data Loader.</h1>
  </div>
</section>

<hr class="divider"/>

<section id="app">
  <div class="app-wrapper">
    <div>
      <div class="e-grid reveal" id="e-grid"></div>

      <div class="act-row reveal d1">
        <div class="act-line l"></div>
        <div class="act-btns">
          <button class="a-btn" id="btn-v" disabled>
            <span class="spinner" id="sp-v" style="display:none"></span>
            Validate
          </button>
          <button class="a-btn" id="btn-l" disabled>
            <span class="spinner" id="sp-l" style="display:none"></span>
            Load
          </button>
        </div>
        <div class="act-line r"></div>
      </div>

      <div id="res-wrap" style="display:none" class="reveal">
        <div class="results-wrap">
          <div class="results-head">
            <span class="results-label">Results</span>
            <span class="results-count" id="res-count">0 records</span>
          </div>
          <table class="rt">
            <thead>
              <tr>
                <th>Entity</th><th>File</th>
                <th>Passed</th><th>Failed</th>
                <th>Status</th><th>Note</th>
              </tr>
            </thead>
            <tbody id="res-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="terminal-panel">
      <div class="term-header">
        <div class="term-dot" style="background:#ff5f57"></div>
        <div class="term-dot" style="background:#febc2e"></div>
        <div class="term-dot" style="background:#28c840"></div>
        <div class="term-title">qad-loader · live stream</div>
      </div>
      <div class="term-body" id="term-body">
        <div style="color:var(--muted2);font-size:10px;margin-top:4px;">Ready to validate or load</div>
      </div>
    </div>
  </div>
</section>

<footer style="padding:28px 52px;border-top:1px solid var(--border);position:relative;z-index:1;">
  <div style="font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);">QAD Data Loader</div>
</footer>

<script>
/* ── CURSOR ── */
const cur=document.getElementById('cur');
const ring=document.getElementById('cur-ring');
let mx=window.innerWidth/2,my=window.innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=Math.round(rx)+'px';ring.style.top=Math.round(ry)+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button,.e-card').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('cur-hover'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('cur-hover'));
});

/* ── NAV SCROLL ── */
window.addEventListener('scroll',()=>{document.getElementById('nav').classList.toggle('scrolled',window.scrollY>40);});

/* ── TERMINAL ── */
const Terminal={
  body:document.getElementById('term-body'),
  lines:[],
  lastProgressLine:null,
  log(text,symbol='•',type='text'){
    const line=document.createElement('div');
    line.className='term-line';
    const sym=document.createElement('div');
    sym.className='term-sym '+type;
    sym.textContent=symbol;
    const txt=document.createElement('div');
    txt.className='term-text';
    txt.textContent=text;
    line.appendChild(sym);
    line.appendChild(txt);
    if(this.lastProgressLine){this.body.removeChild(this.lastProgressLine);this.lastProgressLine=null;}
    this.body.appendChild(line);
    this.lines.push({line,symbol,text,type});
    this.body.scrollTop=this.body.scrollHeight;
  },
  entity(name){
    const line=document.createElement('div');
    line.className='term-entity';
    line.textContent=name;
    this.body.appendChild(line);
    this.body.scrollTop=this.body.scrollHeight;
  },
  progress(text){
    if(this.lastProgressLine){this.body.removeChild(this.lastProgressLine);}
    const line=document.createElement('div');
    line.className='term-line';
    const sym=document.createElement('div');
    sym.className='term-sym process';
    sym.textContent='▸';
    const txt=document.createElement('div');
    txt.className='term-text term-progress';
    txt.textContent=text;
    line.appendChild(sym);
    line.appendChild(txt);
    this.body.appendChild(line);
    this.lastProgressLine=line;
    this.body.scrollTop=this.body.scrollHeight;
  },
  clear(){this.body.innerHTML='';this.lines=[];this.lastProgressLine=null;}
};

/* ── ENTITIES ── */
const ENTITIES=[
  {id:'Supplier',label:'Supplier',sub:'Vendors, contracts',icon:'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'},
  {id:'Customer',label:'Customer',sub:'Accounts, addresses',icon:'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z'},
  {id:'GCM',label:'GCM',sub:'Global cost masters',icon:'M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zM2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z'},
  {id:'BR',label:'BR',sub:'Business relations',icon:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75'},
  {id:'Customer_Item',label:'Customer Item',sub:'Item cross-refs',icon:'M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0'},
  {id:'ProductionOrder',label:'ProductionOrder',sub:'Production headers',icon:'M22 12h-4l-3 9L9 3l-3 9H2'},
  {id:'PurchaseOrder',label:'PurchaseOrder',sub:'PO headers & lines',icon:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8'},
  {id:'SalesOrder',label:'SalesOrder',sub:'SO headers & lines',icon:'M21 16V8a2 2 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z'},
  {id:'Supplier_Item',label:'Supplier Item',sub:'Supplier item refs',icon:'M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82zM7 7h.01'},
  {id:'SupplierPriceList',label:'SupplierPriceList',sub:'Supplier prices',icon:'M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6'},
];

const grid=document.getElementById('e-grid');
ENTITIES.forEach(e=>{
  const c=document.createElement('div');
  c.className='e-card';c.id='card-'+e.id;
  c.innerHTML=`
    <div class="e-header">
      <div class="e-left">
        <div class="e-icon"><svg viewBox="0 0 24 24"><path d="${e.icon}"/></svg></div>
        <div class="e-info">
          <div class="e-name">${e.label}</div>
          <div class="e-sub">${e.sub}</div>
        </div>
      </div>
      <div class="e-chk" id="chk-${e.id}">
        <svg style="display:none" viewBox="0 0 8 6"><path d="M1 3l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    <div class="e-badge-group" id="badge-${e.id}" style="display:none">
      <div class="e-badge-row"><span class="e-badge-label">Files passed</span><span class="e-badge-count" id="badge-pass-${e.id}">0</span></div>
      <div class="e-badge-row"><span class="e-badge-label">Files failed</span><span class="e-badge-count fail" id="badge-fail-${e.id}">0</span></div>
      <div class="e-badge-row"><span class="e-badge-label">Files skipped</span><span class="e-badge-count warn" id="badge-skip-${e.id}">0</span></div>
    </div>`;
  c.addEventListener('click',()=>toggle(e.id));
  grid.appendChild(c);
});

/* ── STATE ── */
const sel=new Set();
let running=false;
const results={};

function toggle(id){
  if(running)return;
  const card=document.getElementById('card-'+id);
  const chk=document.getElementById('chk-'+id);
  if(sel.has(id)){
    sel.delete(id);card.classList.remove('sel');chk.classList.remove('on');chk.querySelector('svg').style.display='none';
  }else{
    sel.add(id);card.classList.add('sel');chk.classList.add('on');chk.querySelector('svg').style.display='';
  }
  syncBtns();
}

function syncBtns(){
  const ok=sel.size>0&&!running;
  document.getElementById('btn-v').disabled=!ok;
  document.getElementById('btn-l').disabled=!ok;
}

function setCard(id,state){
  const c=document.getElementById('card-'+id);
  c.classList.remove('sel','success','failed','processing');
  if(state==='success')c.classList.add('success');
  else if(state==='failed')c.classList.add('failed');
  else if(state==='processing')c.classList.add('processing');
  else if(sel.has(id))c.classList.add('sel');
}

function showBadges(id,passed,failed,skipped){
  const b=document.getElementById('badge-'+id);
  b.style.display='';
  document.getElementById('badge-pass-'+id).textContent=passed;
  document.getElementById('badge-fail-'+id).textContent=failed;
  document.getElementById('badge-skip-'+id).textContent=skipped;
}

/* ── RUN OPERATION ── */
async function runOp(type){
  if(!sel.size||running)return;
  running=true;
  syncBtns();
  Terminal.clear();
  document.getElementById('res-body').innerHTML='';
  document.getElementById('res-wrap').style.display='none';

  sel.forEach(id=>{
    results[id]={passed:0,failed:0,skipped:0};
    document.getElementById('badge-'+id).style.display='none';
    setCard(id,'processing');
  });

  const sv=document.getElementById('sp-v');
  const sl=document.getElementById('sp-l');
  if(type==='validate')sv.style.display='';else sl.style.display='';

  // fetch localhost8000 if you want to test locally

  try{
    const res=await fetch('https://poscodataloader.up.railway.app'+(type==='validate'?'/api/validate':'/api/load'),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({entities:[...sel]})
    });

    if(!res.ok){
      Terminal.log(`Server error: HTTP ${res.status}`,'✘','fail');
      throw new Error('bad response');
    }

    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let buf='';

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop();  // keep incomplete line in buffer

      for(const line of lines){
        const trimmed=line.trim();                       // ← fixed: trim() removes \r
        if(!trimmed.startsWith('data: '))continue;      // ← fixed: startsWith (capital W)
        let ev;
        try{ev=JSON.parse(trimmed.slice(6))}catch{continue}

        // ── event handlers ──
        if(ev.type==='error'){
          Terminal.log(ev.message,'✘','fail');
        }

        if(ev.type==='entity_start'){
          Terminal.entity(ev.entity);
        }

        if(ev.type==='file_start'){
          Terminal.log(`validating ${ev.file}`,'⟳','process');
        }

        if(ev.type==='progress'){
          Terminal.progress(`row ${ev.row} of ${ev.total}...`);
        }

        if(ev.type==='file_result'){
          const passed=ev.fail===0||ev.fail==='0';
          if(!passed){
            setCard(ev.entity,'failed');
            results[ev.entity].failed++;
          }else{
            results[ev.entity].passed++;
          }
          const note=ev.note?` — ${ev.note}`:'';
          Terminal.log(
            `${ev.file} ${passed?'passed':'failed'} (${ev.ok} ok, ${ev.fail} failed)${note}`,
            passed?'✔':'✘',
            passed?'success':'fail'
          );
        }

        if(ev.type==='entity_result'){
          const allPassed=results[ev.entity].failed===0;
          setCard(ev.entity,allPassed?'success':'failed');
          showBadges(ev.entity,results[ev.entity].passed,results[ev.entity].failed,results[ev.entity].skipped);
        }

        if(ev.type==='done'){
          Terminal.log(ev.message,'✔','success');
        }
      }
    }
  }catch(e){
    if(e.message!=='bad response'){
      Terminal.log('Connection error: '+e.message,'✘','fail');
    }
    sel.forEach(id=>setCard(id,'failed'));
  }

  sv.style.display='none';
  sl.style.display='none';
  running=false;
  syncBtns();
}

document.getElementById('btn-v').addEventListener('click',()=>{
  const b=document.getElementById('btn-v');
  b.classList.add('burst');setTimeout(()=>b.classList.remove('burst'),700);
  runOp('validate');
});
document.getElementById('btn-l').addEventListener('click',()=>{
  const b=document.getElementById('btn-l');
  b.classList.add('burst');setTimeout(()=>b.classList.remove('burst'),700);
  runOp('load');
});

/* ── SCROLL REVEAL ── */
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
},{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){
  document.getElementById('grid-bg').style.animation='none';
}
</script>
</body>
</html>
